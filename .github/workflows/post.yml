name: AI Post Bot

on:
  schedule:
    # سيحاول التشغيل كل ساعة، لكن لاحظ أن GitHub قد يتأخر قليلاً
    - cron: "0 * * * *" 
  workflow_dispatch: # للتشغيل اليدوي للتجربة

jobs:
  bot:
    runs-on: ubuntu-latest
    # إضافة صلاحيات الكتابة لضمان عدم وجود قيود على الأكشن
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # يفضل إصدار 20 لدعم fetch المستقر تلقائياً

      - name: Install dependencies
        run: |
          npm install
          # إضافة node-fetch للتأكد من عمل fetch في بيئة الـ Action
          npm install node-fetch 

      - name: Run bot
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node bot.js
