name: AI Post Bot

on:
  schedule:
    - cron: "0 * * * *"  # كل ساعة
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run bot
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 👈 تأكد إنك ضفت ده في GitHub Secrets
        run: node bot.js
